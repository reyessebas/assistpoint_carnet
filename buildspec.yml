version: 0.2

env:
  variables:
    IMAGE_REPO_NAME: assist-point
    IMAGE_TAG: latest

phases:
  pre_build:
    commands:
      - aws --version
      - AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
      - AWS_REGION="${AWS_DEFAULT_REGION:-us-east-1}"
      - REPOSITORY_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_REPO_NAME"
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
      - aws ecr describe-repositories --repository-names "$IMAGE_REPO_NAME" --region "$AWS_REGION" || aws ecr create-repository --repository-name "$IMAGE_REPO_NAME" --region "$AWS_REGION"
  build:
    commands:
      - docker build -t "$IMAGE_REPO_NAME:$IMAGE_TAG" .
      - docker tag "$IMAGE_REPO_NAME:$IMAGE_TAG" "$REPOSITORY_URI:$IMAGE_TAG"
      - docker tag "$IMAGE_REPO_NAME:$IMAGE_TAG" "$REPOSITORY_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION"
  post_build:
    commands:
      - docker push "$REPOSITORY_URI:$IMAGE_TAG"
      - docker push "$REPOSITORY_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION"
      - printf '[{"name":"assist-point","imageUri":"%s"}]' "$REPOSITORY_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION" > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
