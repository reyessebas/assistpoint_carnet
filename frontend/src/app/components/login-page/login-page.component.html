<div class="login">
    <div class="div">
        <img class="curvas-azul" src="/img/Curvas_Azul_2.png" alt="Decoración" />
        <header class="header">
            <div class="frame">
                <div class="frame-2">
                    <img class="img" src="/img/Curvas_Azul.png" alt="Assist Point Logo" />
                    <div class="text-wrapper">ASSIST POINT</div>
                </div>
                <div class="material-symbols">
                    <img class="vector" src="/img/vector.svg" alt="Ícono" />
                </div>
            </div>
        </header>
        <div class="rectangle"></div>
        <img class="element" src="/img/1.png" alt="Elemento decorativo 1" />
        <div class="rectangle-2"></div>
        <img class="element-2" src="/img/2.png" alt="Elemento decorativo 2" />

        <div class="form-log-in-wrapper">
            <form class="form-log-in" (ngSubmit)="onSubmit()" autocomplete="off">
                <div class="input-field">
                    <label class="label" for="email">Email</label>
                    <div class="input">
                        <input id="email" name="email" type="email" class="text-input"
                               [(ngModel)]="email" placeholder="correo@assistpoint.co" required />
                    </div>
                </div>
                <div class="input-field-2">
                    <label class="label" for="password">Password</label>
                    <div class="input">
                        <input id="password" name="password" [type]="hidePassword ? 'password' : 'text'"
                               class="text-input" [(ngModel)]="password" placeholder="Password" required />
                        <button type="button" class="password-toggle" (click)="hidePassword = !hidePassword"
                                [attr.aria-label]="hidePassword ? 'Mostrar contraseña' : 'Ocultar contraseña'"
                                style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.1rem;">
                            {{ hidePassword ? '👁️‍🗨️' : '👁️' }}
                        </button>
                    </div>
                </div>
                <div class="button-group">
                    <button class="button" type="submit" [disabled]="loading">
                        <div class="button-2">{{ loading ? 'INGRESANDO...' : 'Sign In' }}</div>
                    </button>
                </div>
                <div class="login-feedback" *ngIf="error" role="alert">{{ error }}</div>
            </form>
        </div>
        <div class="text-wrapper-3">ID CARD SYSTEM</div>
    </div>
    <div class="footer">
        <div class="footerr">
            <div class="text-wrapper-4">.</div>
        </div>
    </div>
</div>
